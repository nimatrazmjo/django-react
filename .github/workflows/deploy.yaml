# .github/workflows/deploy.yaml — CI/CD pipeline for all three environments.
#
# Branch → environment mapping:
#   main    → production  (namespace: production, image tags: <sha> + latest)
#   staging → staging     (namespace: staging,    image tags: staging-<sha> + staging-latest)
#   qa      → qa          (namespace: qa,          image tags: qa-<sha> + qa-latest)
#
# Why branch-prefixed image tags?
#   ACR is a shared registry. If QA and staging deploy at the same time and both
#   push "backend:latest", one overwrites the other. Prefixed tags keep each
#   environment's images completely separate and independently rollback-able.
#   The full SHA tag is always unique per commit regardless of branch prefix.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID        — Azure AD app client ID for OIDC auth (not a password).
#   AZURE_TENANT_ID        — Your Azure AD tenant (directory) ID.
#   AZURE_SUBSCRIPTION_ID  — The Azure subscription containing ACR and AKS.
#   ACR_NAME               — ACR name without the domain (e.g. "myapp" for myapp.azurecr.io).
#   AKS_CLUSTER_NAME       — AKS cluster name.
#   AKS_RESOURCE_GROUP     — Resource group containing the AKS cluster.
#
# Why OIDC instead of client secrets?
#   OIDC issues a short-lived token per workflow run scoped to this repo and branch.
#   No credential is stored anywhere — nothing to rotate, nothing to leak.
#   If a bad actor gets access to your repo secrets, they get an ID, not a password.
#   Setup guide: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure

name: Build and Deploy to AKS

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main     # → production deploy
      - staging  # → staging deploy
      - qa       # → qa deploy
    # All other branches (feature/*, fix/*, etc.) do NOT trigger any deploy.
    # Open a PR against qa to start the promotion chain: qa → staging → main.

# ── OIDC permissions ──────────────────────────────────────────────────────────
permissions:
  id-token: write  # Lets this workflow request a GitHub OIDC token to exchange
                   # for a short-lived Azure access token. Required by azure/login.
  contents: read   # Lets the workflow check out the repository.

# ── Shared environment variables ──────────────────────────────────────────────
env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
  # Computed once here; referenced as ${{ env.ACR_LOGIN_SERVER }} in all jobs.

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Build and push Docker images to ACR
  #
  # Runs on every push to main, staging, or qa.
  # Produces two outputs consumed by the deploy jobs:
  #   - image-tag: the short git SHA (e.g. "a1b2c3d")
  #   - tag-prefix: branch-scoped prefix (e.g. "qa-", "staging-", "")
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      tag-prefix: ${{ steps.meta.outputs.prefix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Compute branch-scoped image tag ──────────────────────────────────────
      - name: Compute image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ github.ref_name }}"

          # Prefix image tags by branch so QA/staging/production images never
          # collide in ACR. Production (main) has no prefix to match convention.
          if [[ "$BRANCH" == "main" ]]; then
            PREFIX=""
          else
            PREFIX="${BRANCH}-"   # "qa-" or "staging-"
          fi

          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
        # Examples of what this produces:
        #   main    branch, commit abc1234 → tag=abc1234, prefix=""
        #           images pushed as: backend:abc1234  and backend:latest
        #   staging branch, commit def5678 → tag=def5678, prefix="staging-"
        #           images pushed as: backend:staging-def5678 and backend:staging-latest
        #   qa      branch, commit ghi9012 → tag=ghi9012, prefix="qa-"
        #           images pushed as: backend:qa-ghi9012 and backend:qa-latest

      # ── Authenticate to Azure via OIDC ───────────────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        # Exchanges the GitHub OIDC JWT for a short-lived Azure access token.
        # The token is scoped to this repo + branch and expires when the job ends.
        # No password, no secret, nothing to rotate.

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}
        # Uses the Azure token from the step above to authorise Docker push to ACR.

      # ── Build and push backend ────────────────────────────────────────────────
      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/backend"
          PREFIX="${{ steps.meta.outputs.prefix }}"
          TAG="${{ steps.meta.outputs.tag }}"

          # VITE_* are frontend-only; backend has no build args that vary by branch.
          docker build \
            --target production \
            --tag "${IMAGE}:${PREFIX}${TAG}" \
            --tag "${IMAGE}:${PREFIX}latest" \
            ./backend
          # --target production: gunicorn stage, non-root user (see backend/Dockerfile).
          # SHA tag: lets you trace exactly which commit is running in any environment.
          #          Roll back by setting this tag in the deployment — no rebuild needed.
          # prefix-latest tag: used for human reference ("what's the latest QA build?").

          docker push "${IMAGE}:${PREFIX}${TAG}"
          docker push "${IMAGE}:${PREFIX}latest"

      # ── Build and push frontend ───────────────────────────────────────────────
      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/frontend"
          PREFIX="${{ steps.meta.outputs.prefix }}"
          TAG="${{ steps.meta.outputs.tag }}"
          BRANCH="${{ github.ref_name }}"

          # VITE_API_URL is baked into the JS bundle at build time (not a runtime var).
          # It must match the public hostname of the API for each environment.
          # Update these URLs to match your actual domain names.
          if [[ "$BRANCH" == "main" ]]; then
            VITE_API_URL="https://myapp.com"
            VITE_ENV="production"
          elif [[ "$BRANCH" == "staging" ]]; then
            VITE_API_URL="https://staging.myapp.com"
            VITE_ENV="staging"
          else
            VITE_API_URL="https://qa.myapp.com"
            VITE_ENV="qa"
          fi

          docker build \
            --target production \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --build-arg VITE_ENV="${VITE_ENV}" \
            --tag "${IMAGE}:${PREFIX}${TAG}" \
            --tag "${IMAGE}:${PREFIX}latest" \
            ./frontend

          docker push "${IMAGE}:${PREFIX}${TAG}"
          docker push "${IMAGE}:${PREFIX}latest"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2a: Deploy to QA
  # Runs only on push to the qa branch.
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'qa'
    # if: ensures this job is silently skipped on main and staging pushes.
    # It does not fail the workflow — the other deploy job simply runs instead.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Needed to access the k8s/overlays/qa/ directory.

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        # Each job gets a fresh OIDC token — tokens from other jobs cannot be reused.

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ── Apply QA overlay ──────────────────────────────────────────────────────
      - name: Apply QA manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/qa
        # kubectl apply -k uses Kustomize to render the overlay and apply the result.
        # This is equivalent to: kubectl kustomize k8s/overlays/qa | kubectl apply -f -
        # The QA overlay sets namespace: qa, 1 replica, and smaller resource sizes.
        # kubectl apply is idempotent — safe to re-run; it creates or updates as needed.

      # ── Pin the exact image tag that was just built ───────────────────────────
      - name: Pin backend image tag in QA
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/backend backend=${{ env.ACR_LOGIN_SERVER }}/backend:${TAG} -n qa
        # kubectl apply -k sets the image to whatever is in the base deployment.yaml (:latest).
        # This step overwrites it with the exact SHA tag built in this run.
        # Without this, a pod restart could pull a different "latest" than what CI tested.
        # With this, every pod in QA runs precisely the commit that triggered this workflow.

      - name: Pin frontend image tag in QA
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/frontend frontend=${{ env.ACR_LOGIN_SERVER }}/frontend:${TAG} -n qa

      # ── Wait for rollouts — pipeline fails here if pods crash ─────────────────
      - name: Wait for backend rollout in QA
        run: kubectl rollout status deployment/backend -n qa --timeout=5m
        # rollout status blocks until all pods are running the new image AND passing
        # their readiness probe (/api/health/ for the backend).
        # If pods crash on startup (bad migration, OOMKilled, wrong config),
        # rollout status exits non-zero and THIS STEP FAILS — the pipeline stops,
        # GitHub marks the run as failed, and notifications fire immediately.
        # A broken QA deploy will never silently pass as green.
        # --timeout=5m: if no progress in 5 minutes, give up and fail the pipeline.
        # Increase if your migrations are known to take longer.

      - name: Wait for frontend rollout in QA
        run: kubectl rollout status deployment/frontend -n qa --timeout=3m
        # nginx starts in ~1 second. 3-minute timeout is very conservative.
        # Failure here usually means: image pull error, resource quota exceeded,
        # or node has insufficient capacity.

      - name: Show QA pod status
        if: always()   # Run even if a previous step failed — useful for debugging.
        run: kubectl get pods -n qa
        # Final visual confirmation. All pods should show Running / Ready (1/1 or 2/2).

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2b: Deploy to Staging
  # Runs only on push to the staging branch.
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ── Apply staging overlay ─────────────────────────────────────────────────
      - name: Apply staging manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/staging
        # Staging overlay: namespace: staging, 2 replicas, medium resource sizes.
        # Running 2 replicas means rolling updates are tested — same as production.
        # If a rolling update fails in staging, it will fail in production too.
        # Find it here, not there.

      - name: Pin backend image tag in staging
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/backend backend=${{ env.ACR_LOGIN_SERVER }}/backend:${TAG} -n staging

      - name: Pin frontend image tag in staging
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/frontend frontend=${{ env.ACR_LOGIN_SERVER }}/frontend:${TAG} -n staging

      # ── Wait for rollouts — pipeline fails here if pods crash ─────────────────
      - name: Wait for backend rollout in staging
        run: kubectl rollout status deployment/backend -n staging --timeout=5m
        # Same guarantee as QA: if the deploy is broken, this step fails,
        # the pipeline fails, and you are notified before it reaches production.
        # Staging is the last gate before main — treat failures here seriously.

      - name: Wait for frontend rollout in staging
        run: kubectl rollout status deployment/frontend -n staging --timeout=3m

      - name: Show staging pod status
        if: always()
        run: kubectl get pods -n staging

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2c: Deploy to Production
  # Runs only on push to main.
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ── Apply production overlay ──────────────────────────────────────────────
      - name: Apply production manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/production
        # Production overlay: namespace: production, 2 replicas, full resource sizes.
        # kubectl apply is idempotent — existing resources are updated in-place.
        # New resources (first deploy) are created. Nothing is deleted by apply alone.

      - name: Pin backend image tag in production
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/backend backend=${{ env.ACR_LOGIN_SERVER }}/backend:${TAG} -n production
        # TAG for production has no prefix (prefix is ""), so this resolves to just the SHA:
        # e.g. backend:a1b2c3d — the exact commit that passed QA and staging before reaching here.

      - name: Pin frontend image tag in production
        run: |
          TAG="${{ needs.build-and-push.outputs.tag-prefix }}${{ needs.build-and-push.outputs.image-tag }}"
          kubectl set image deployment/frontend frontend=${{ env.ACR_LOGIN_SERVER }}/frontend:${TAG} -n production

      # ── Wait for rollouts — pipeline fails here if pods crash ─────────────────
      - name: Wait for backend rollout in production
        run: kubectl rollout status deployment/backend -n production --timeout=5m
        # This is the production safety gate.
        # If a pod fails its readiness probe (/api/health/) during rollout:
        #   - Kubernetes pauses the rolling update
        #   - The old pods keep serving traffic (zero downtime preserved)
        #   - rollout status exits non-zero after --timeout
        #   - This step fails → the pipeline fails → you are immediately notified
        # The deploy is NOT automatically rolled back — Kubernetes holds the
        # partial rollout until you manually run: kubectl rollout undo deployment/backend -n production
        # This prevents automated rollbacks from masking the root cause.

      - name: Wait for frontend rollout in production
        run: kubectl rollout status deployment/frontend -n production --timeout=3m

      - name: Show production pod status
        if: always()
        run: kubectl get pods -n production
