# .github/workflows/deploy.yaml — CI/CD pipeline for all three environments.
#
# Branch → environment mapping:
#   main    → production  (namespace: production, image tags: <sha> + latest)
#   staging → staging     (namespace: staging,    image tags: staging-<sha> + staging-latest)
#   qa      → qa          (namespace: qa,          image tags: qa-<sha> + qa-latest)
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID        — Azure AD app client ID for OIDC auth.
#   AZURE_TENANT_ID        — Your Azure AD tenant (directory) ID.
#   AZURE_SUBSCRIPTION_ID  — The Azure subscription containing ACR and AKS.
#   ACR_NAME               — ACR name without the domain (e.g. "myapp" for myapp.azurecr.io).
#   AKS_CLUSTER_NAME       — AKS cluster name.
#   AKS_RESOURCE_GROUP     — Resource group containing the AKS cluster.
#
# Required GitHub variables (Settings → Secrets and variables → Actions → Variables):
#   VITE_API_URL_PROD      — Public backend URL for the production frontend bundle.
#   VITE_API_URL_STAGING   — Public backend URL for the staging frontend bundle.
#   VITE_API_URL_QA        — Public backend URL for the QA frontend bundle.
#   These are baked into the JS bundle at build time, so they must be real hostnames,
#   not secrets. Never put a secret in a VITE_* variable — it ends up in the browser.

name: Build and Deploy to AKS

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - staging
      - qa

# ── Concurrency ────────────────────────────────────────────────────────────────
# One active deploy per branch at a time. A newer push cancels the in-flight
# run so a stale build never lands after a fix is already committed.
# Also prevents simultaneous writes to the same buildcache tag in ACR.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

# ── Permissions ────────────────────────────────────────────────────────────────
# id-token: write      — request a GitHub OIDC token to exchange for Azure access.
# contents: read       — check out the repository.
# security-events: write — upload Trivy SARIF reports to the GitHub Security tab.
permissions:
  id-token: write
  contents: read
  security-events: write

# ── Shared environment variables ───────────────────────────────────────────────
env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1a: Build and push backend image
#
# Runs in parallel with build-frontend. Outputs full-tag (prefix+sha) consumed
# by all deploy jobs to pin the exact commit to each environment.
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-24.04
    outputs:
      full-tag: ${{ steps.meta.outputs.full-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Compute branch-scoped image tag ──────────────────────────────────────
      - name: Compute image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ github.ref_name }}"

          if [[ "$BRANCH" == "main" ]]; then
            PREFIX=""
          else
            PREFIX="${BRANCH}-"
          fi

          echo "tag=${SHORT_SHA}"             >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}"             >> "$GITHUB_OUTPUT"
          echo "full-tag=${PREFIX}${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Docker Buildx — required for registry-backed layer cache ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # ── Authenticate to Azure via OIDC ───────────────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Build locally so Trivy can scan before the image reaches ACR ──────────
      - name: Build backend image (local scan target)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          load: true
          tags: backend:scan
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/backend:buildcache

      # ── Vulnerability scan ────────────────────────────────────────────────────
      # exit-code is '0' (report-only) until existing base-image CVEs are triaged.
      # Flip to '1' to block pushes on CRITICAL/HIGH findings once baseline is clear.
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload backend scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: backend

      # ── Push to ACR with registry cache and supply-chain attestations ─────────
      # BuildKit reuses the layers already built in the scan step — no rebuild.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/backend:${{ steps.meta.outputs.full-tag }}
            ${{ env.ACR_LOGIN_SERVER }}/backend:${{ steps.meta.outputs.prefix }}latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/backend:buildcache,mode=max
          provenance: mode=max
          sbom: true

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 1b: Build and push frontend image
  #
  # Runs in parallel with build-backend. Computes VITE_* build args from
  # GitHub Actions variables — never hardcoded, never a secret.
  # ══════════════════════════════════════════════════════════════════════════════
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-24.04
    outputs:
      full-tag: ${{ steps.meta.outputs.full-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Compute branch-scoped tag and Vite build args ─────────────────────────
      - name: Compute image tags and Vite vars
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ github.ref_name }}"

          if [[ "$BRANCH" == "main" ]]; then
            PREFIX=""
            VITE_API_URL="${{ vars.VITE_API_URL_PROD }}"
            VITE_ENV="production"
          elif [[ "$BRANCH" == "staging" ]]; then
            PREFIX="staging-"
            VITE_API_URL="${{ vars.VITE_API_URL_STAGING }}"
            VITE_ENV="staging"
          else
            PREFIX="qa-"
            VITE_API_URL="${{ vars.VITE_API_URL_QA }}"
            VITE_ENV="qa"
          fi

          echo "tag=${SHORT_SHA}"             >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}"             >> "$GITHUB_OUTPUT"
          echo "full-tag=${PREFIX}${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "vite-api-url=${VITE_API_URL}" >> "$GITHUB_OUTPUT"
          echo "vite-env=${VITE_ENV}"         >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Build locally for scan ────────────────────────────────────────────────
      - name: Build frontend image (local scan target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: production
          load: true
          tags: frontend:scan
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.vite-api-url }}
            VITE_ENV=${{ steps.meta.outputs.vite-env }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/frontend:buildcache

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload frontend scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ steps.meta.outputs.vite-api-url }}
            VITE_ENV=${{ steps.meta.outputs.vite-env }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ steps.meta.outputs.full-tag }}
            ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ steps.meta.outputs.prefix }}latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/frontend:buildcache,mode=max
          provenance: mode=max
          sbom: true

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 2a/2b/2c: Deploy to QA / Staging / Production
  #
  # Each calls the reusable _deploy-env.yaml workflow with environment-specific
  # inputs. Only one runs per trigger (the if: condition is mutually exclusive).
  # All three need both build jobs — a failed scan blocks every deploy.
  # ══════════════════════════════════════════════════════════════════════════════
  deploy-qa:
    name: Deploy to QA
    needs: [build-backend, build-frontend]
    if: github.ref_name == 'qa'
    uses: ./.github/workflows/_deploy-env.yaml
    with:
      environment: qa
      namespace: qa
      full-tag: ${{ needs.build-backend.outputs.full-tag }}
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: [build-backend, build-frontend]
    if: github.ref_name == 'staging'
    uses: ./.github/workflows/_deploy-env.yaml
    with:
      environment: staging
      namespace: staging
      full-tag: ${{ needs.build-backend.outputs.full-tag }}
    secrets: inherit

  deploy-production:
    name: Deploy to Production
    needs: [build-backend, build-frontend]
    if: github.ref_name == 'main'
    uses: ./.github/workflows/_deploy-env.yaml
    with:
      environment: production
      namespace: production
      full-tag: ${{ needs.build-backend.outputs.full-tag }}
    secrets: inherit
