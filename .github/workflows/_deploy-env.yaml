# .github/workflows/_deploy-env.yaml — Reusable deploy workflow.
#
# Called by deploy.yaml for each environment (qa / staging / production).
# All three deploy jobs were previously identical except for namespace and
# overlay path; this single workflow eliminates that duplication.
#
# Inputs:
#   environment  — human label used in log output (qa / staging / production)
#   namespace    — Kubernetes namespace to deploy into
#   full-tag     — fully-qualified image tag (e.g. "qa-abc1234" or "abc1234" for prod)
#
# Secrets: inherited from the caller — no enumeration required.
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#   ACR_NAME, AKS_CLUSTER_NAME, AKS_RESOURCE_GROUP

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment label (qa / staging / production)"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace"
        required: true
        type: string
      full-tag:
        description: "Full image tag including branch prefix (e.g. qa-abc1234)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── Authenticate to Azure via OIDC ────────────────────────────────────────
      # Each job requires its own OIDC token — tokens do not cross job boundaries.
      - name: Azure login (OIDC)
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ── Pin the exact image tag in the Kustomize overlay ─────────────────────
      # Modifies the overlay file locally (not committed to git) so the
      # subsequent kubectl apply picks up the SHA tag built for this run.
      # This avoids `kubectl set image` which mutates live cluster state without
      # updating the overlay — causing drift on the next `kubectl apply -k`.
      - name: Pin image tags in Kustomize overlay
        run: |
          ACR="${{ secrets.ACR_NAME }}.azurecr.io"
          TAG="${{ inputs.full-tag }}"
          cd k8s/overlays/${{ inputs.environment }}
          kustomize edit set image \
            "<ACR_NAME>.azurecr.io/backend=${ACR}/backend:${TAG}"
          kustomize edit set image \
            "<ACR_NAME>.azurecr.io/frontend=${ACR}/frontend:${TAG}"

      # ── Apply Kustomize overlay ───────────────────────────────────────────────
      # kubectl apply is idempotent — creates or updates as needed.
      # The overlay was patched in the previous step with the exact image tag.
      - name: Apply ${{ inputs.environment }} manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/${{ inputs.environment }}

      # ── Wait for rollouts ─────────────────────────────────────────────────────
      # rollout status blocks until all pods pass their readiness probe.
      # If pods crash or fail their probe, this step exits non-zero and the
      # pipeline fails — a broken deploy never silently passes as green.
      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ inputs.namespace }} --timeout=5m

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ inputs.namespace }} --timeout=3m

      # ── Final status dump — runs even on failure for debugging ─────────────────
      - name: Show pod status
        if: always()
        run: kubectl get pods -n ${{ inputs.namespace }}
