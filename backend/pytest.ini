[pytest]
# DJANGO_SETTINGS_MODULE is not set here so pytest-django does not
# bootstrap Django for domain/application unit tests.
# Pass --ds=config.settings.dev when running interface/integration tests
# that require the Django stack (e.g. pytest --ds=config.settings.dev tests/interfaces/).
django_find_project = false
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
