[pytest]
# pythonpath = . ensures backend/ is on sys.path before any plugin
# (including pytest-django) loads, so config.settings.dev is importable
# even when DJANGO_SETTINGS_MODULE is set in the CI environment.
# django_find_project = false prevents pytest-django from scanning for
# manage.py; domain/application unit tests don't bootstrap Django at all.
# Pass --ds=config.settings.dev only when running interface/integration tests.
django_find_project = false
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
