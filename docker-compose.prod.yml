# docker-compose.prod.yml — OVERRIDES for production
version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: production
    volumes: []
    env_file:
      - .env.prod
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: https://myapp.com
        VITE_ENV: production
    volumes: []
    env_file:
      - .env.prod
    deploy:
      replicas: 2

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro   # SSL certs
    depends_on:
      - backend
      - frontend
    networks:
      - app-network