# secrets.yaml — Placeholder template for sensitive environment variables.
#
# What this file does:
#   A Kubernetes Secret stores base64-encoded key/value pairs that pods read
#   as environment variables. Unlike ConfigMaps, Secrets are stored separately
#   in etcd and RBAC can restrict who can read them.
#
# ⚠️  IMPORTANT — Secrets are base64-encoded, NOT encrypted.
#   Base64 is trivially reversible: echo <value> | base64 -d
#   This means anyone with kubectl access can read the real values.
#
#   For real production security, do NOT store real values in this file.
#   Use Azure Key Vault with the Secrets Store CSI Driver instead:
#   https://learn.microsoft.com/en-us/azure/aks/csi-secrets-store-driver
#   This file is a REFERENCE TEMPLATE ONLY.
#
# ⚠️  NEVER commit this file with real values to version control.
#   The placeholder string <REPLACE_ME> is safe to commit.
#   Real values must be injected via CI/CD or applied manually.
#
# How to apply (after replacing placeholders):
#   kubectl apply -f k8s/secrets.yaml
#
# How to verify:
#   kubectl get secret app-secrets -n production
#   kubectl describe secret app-secrets -n production
#   # Note: describe shows key names but NOT values — that is intentional.
#
# How to base64-encode a value before putting it here:
#   echo -n "my-secret-value" | base64
#   # Use -n to avoid encoding a trailing newline character.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets    # Referenced by name in each deployment.yaml.
                       # Rename here AND in every deployment if you change this.
  namespace: production
type: Opaque           # Generic key/value secret. Other types exist for TLS certs
                       # and Docker registry credentials (handled separately via imagePullSecrets).

data:
  # ── Django ───────────────────────────────────────────────────────────────────

  DJANGO_SECRET_KEY: "<REPLACE_ME>"
  # Django uses this to sign cookies, sessions, CSRF tokens, and password reset
  # links. If this leaks, attackers can forge any of those.
  # Generate a strong one: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
  # Then base64-encode it: echo -n "<generated-key>" | base64

  DATABASE_URL: "<REPLACE_ME>"
  # Full PostgreSQL connection string including credentials.
  # Format: postgres://<user>:<password>@<host>:<port>/<dbname>
  # For AKS self-hosted Postgres (this repo): postgres://postgres:<password>@db:5432/myapp_prod
  # For Azure Database for PostgreSQL (recommended for production):
  #   postgres://<admin-user>@<server-name>:<password>@<server-name>.postgres.database.azure.com:5432/<dbname>?sslmode=require
  # base64-encode the full string before placing it here.

  REDIS_URL: "<REPLACE_ME>"
  # Redis connection string.
  # For AKS self-hosted Redis (this repo): redis://redis:6379/0
  # For Azure Cache for Redis (recommended for production):
  #   rediss://:<access-key>@<cache-name>.redis.cache.windows.net:6380/0
  # base64-encode the full string before placing it here.

  # ── PostgreSQL container credentials ─────────────────────────────────────────
  # These are used by the db Deployment (postgres container) to initialise the
  # database on first boot. They must match the credentials in DATABASE_URL above.

  POSTGRES_USER: "<REPLACE_ME>"
  # The database superuser username. Default in dev is "postgres".
  # base64-encode: echo -n "postgres" | base64

  POSTGRES_PASSWORD: "<REPLACE_ME>"
  # The database superuser password. Use a strong random password in production.
  # Generate: openssl rand -base64 32
  # base64-encode the result before placing it here.

  POSTGRES_DB: "<REPLACE_ME>"
  # The name of the database to create on first boot.
  # Example: "myapp_prod"
  # base64-encode: echo -n "myapp_prod" | base64
