{{/*
rbac.yaml — ServiceAccounts, Roles, ClusterRoles, Bindings rendered from Helm values.
Controlled by .Values.rbac.create — set to false to skip all RBAC creation.
*/}}

{{- if .Values.rbac.create }}
# ── ServiceAccounts ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
automountServiceAccountToken: false

---
# ── Role: backend can read its own ConfigMap and Secret ───────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "django-react.fullname" . }}-backend-reader
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["app-config"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]

---
# ── Role: migration Job reads Secrets + ConfigMaps ────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "django-react.fullname" . }}-migration-reader
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["app-config"]
    verbs: ["get"]

---
# ── ClusterRole: reusable deployer (bound via RoleBinding per namespace) ──────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "django-react.fullname" . }}-namespace-deployer
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
    app.kubernetes.io/component: cicd
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status", "deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests", "issuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# ── ClusterRole: PV + StorageClass reader ────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "django-react.fullname" . }}-pv-reader
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

---
# ── RoleBinding: backend-sa → backend-reader ──────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "django-react.fullname" . }}-backend-reader
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ include "django-react.fullname" . }}-backend-reader
  apiGroup: rbac.authorization.k8s.io

---
# ── RoleBinding: migration-sa → migration-reader ──────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "django-react.fullname" . }}-migration-reader
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: migration-sa
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: {{ include "django-react.fullname" . }}-migration-reader
  apiGroup: rbac.authorization.k8s.io

---
# ── RoleBinding: CI SA → namespace-deployer ClusterRole (scoped to namespace) ─
# Binding a ClusterRole with a RoleBinding scopes its permissions to this
# namespace only — the CI SA cannot act on other namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "django-react.fullname" . }}-cicd-deployer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.cicdServiceAccountName }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "django-react.fullname" . }}-namespace-deployer
  apiGroup: rbac.authorization.k8s.io

---
# ── ClusterRoleBinding: CI SA → PV reader (cluster-scoped) ───────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "django-react.fullname" . }}-cicd-pv-reader
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.cicdServiceAccountName }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "django-react.fullname" . }}-pv-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
