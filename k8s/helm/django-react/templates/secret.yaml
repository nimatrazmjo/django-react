{{- if .Values.secrets.create }}
# ── Secret ────────────────────────────────────────────────────────────────────
# Helm manages this Secret's lifecycle. If secrets.create is false, a
# pre-existing Secret named "app-secrets" is expected in the namespace.
#
# Production recommendation: set secrets.create: false and create the Secret
# via the Azure Key Vault CSI driver or sealed-secrets instead of --set flags.
# Helm stores release values (including secrets) in a cluster Secret — anyone
# with kubectl access to helm releases can read these values.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "django-react.labels" . | nindent 4 }}
  annotations:
    # Prevents helm uninstall from deleting secrets — you'd lose credentials.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # stringData: Helm encodes these as base64 automatically.
  # Never use data: with manually base64-encoded values here — Helm double-encodes them.
  DJANGO_SECRET_KEY: {{ .Values.secrets.djangoSecretKey | required "secrets.djangoSecretKey is required" | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | required "secrets.databaseUrl is required" | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | required "secrets.redisUrl is required" | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | required "secrets.postgresUser is required" | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | required "secrets.postgresPassword is required" | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | required "secrets.postgresDb is required" | quote }}
{{- end }}
