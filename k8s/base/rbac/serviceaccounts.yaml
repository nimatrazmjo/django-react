# rbac/serviceaccounts.yaml
#
# A dedicated ServiceAccount per component is the foundation of RBAC.
# By default every pod runs as the "default" SA which accumulates permissions
# granted to anything else in the namespace. Dedicated SAs let you:
#   - Grant only what each component actually needs (principle of least privilege)
#   - Audit which component called which API (SA name appears in audit logs)
#   - Rotate credentials per component without touching others
#   - Disable automounting of the SA token for components that never touch the API server

# ── Backend (Django / Gunicorn) ───────────────────────────────────────────────
# The backend needs to read its own ConfigMap and Secret (injected via envFrom,
# so Kubernetes reads them — not the app itself). It does NOT need any API
# server access at runtime, so we disable the auto-mounted token.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: production
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: django-react
  annotations:
    # On AKS: bind this SA to an Azure Managed Identity via Workload Identity
    # to give the pod access to Azure Key Vault, Blob, etc. without static credentials.
    # azure.workload.identity/client-id: "<MANAGED_IDENTITY_CLIENT_ID>"
    description: "Django/Gunicorn API pods — no API server access needed at runtime"
automountServiceAccountToken: false  # Never mounts /var/run/secrets/kubernetes.io/serviceaccount/
                                     # Removes the token that attackers target first in a pod escape.
                                     # Re-enable only if the app uses client-go to call the k8s API.

---
# ── Frontend (nginx serving React) ───────────────────────────────────────────
# nginx serves static files. Zero API server access needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: production
  labels:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: django-react
  annotations:
    description: "nginx/React static file pods — no API server access needed"
automountServiceAccountToken: false

---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-sa
  namespace: production
  labels:
    app.kubernetes.io/component: db
    app.kubernetes.io/part-of: django-react
  annotations:
    description: "PostgreSQL pods — no API server access needed"
automountServiceAccountToken: false

---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: production
  labels:
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: django-react
  annotations:
    description: "Redis pods — no API server access needed"
automountServiceAccountToken: false

---
# ── Migration Job SA ──────────────────────────────────────────────────────────
# Used by the pre-deploy DB migration Job. Also needs no API access —
# it just runs Django management commands and exits.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-sa
  namespace: production
  labels:
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: django-react
  annotations:
    description: "Django migrate Job — runs once per deploy, no API server access"
automountServiceAccountToken: false
