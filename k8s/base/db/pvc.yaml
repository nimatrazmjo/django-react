# db/pvc.yaml — PersistentVolumeClaim for PostgreSQL data storage.
#
# Uses the managed-premium StorageClass defined in storage/storageclass.yaml
# which provisions an Azure Premium SSD with:
#   - reclaimPolicy: Retain  → disk survives PVC deletion
#   - WaitForFirstConsumer   → disk created in same AZ as the pod
#   - allowVolumeExpansion   → resize without downtime (kubectl patch pvc)
#
# PRODUCTION NOTE:
#   In-cluster Postgres is suitable for dev and low-traffic production.
#   For critical workloads use Azure Database for PostgreSQL (Flexible Server):
#     - Automated backups + point-in-time restore
#     - Zone-redundant HA (synchronous standby)
#     - Read replicas
#   If you migrate, delete this PVC, the db Deployment, and update DATABASE_URL.
#
# Resize the volume (AKS 1.24+):
#   kubectl patch pvc postgres-data -n production \
#     -p '{"spec":{"resources":{"requests":{"storage":"50Gi"}}}}'
#   # Then restart the db pod to let the CSI driver resize the filesystem.
#
# Check current usage:
#   kubectl exec -it <db-pod> -n production -- df -h /var/lib/postgresql/data
#
# Backup approach for in-cluster Postgres:
#   Use pg_dump via a CronJob to dump to Azure Blob Storage.
#   Or use Velero with azure plugin to snapshot the entire PVC.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: production
  labels:
    app.kubernetes.io/component: db
    app.kubernetes.io/part-of: django-react
  annotations:
    # Protects the PVC from accidental deletion via kubectl delete.
    # Remove this annotation before intentionally deleting the PVC.
    # kubectl annotate pvc postgres-data -n production helm.sh/resource-policy-
    helm.sh/resource-policy: keep   # Helm: don't delete this PVC on helm uninstall.
    description: "PostgreSQL primary data volume — reclaimPolicy:Retain means disk survives PVC deletion"
spec:
  accessModes:
    - ReadWriteOnce          # Single-node mount only — correct for single-replica Postgres.
                             # Never use ReadWriteMany for a relational database.

  storageClassName: managed-premium   # From storage/storageclass.yaml.
                                      # Premium SSD: 120 IOPS/GB (P4=120, P10=500, P20=2300).
                                      # 20Gi → Azure P4 tier → 120 IOPS, 25 MB/s.
                                      # For heavier workloads, request 128Gi to get P10 (500 IOPS).

  resources:
    requests:
      storage: 20Gi          # Starting size. Resize online when > 70% full.
                             # Monitor: kubectl exec <db-pod> -- df -h /var/lib/postgresql/data
                             # Azure disk minimum is 1Gi; Premium SSD minimum billable size is 4Gi.
