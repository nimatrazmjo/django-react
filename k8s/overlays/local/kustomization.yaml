# overlays/local/kustomization.yaml — Local development overlay for K8s testing.
#
# Runs the full stack on a local cluster (Docker Desktop / kind / k3d / minikube).
# Images are built locally and referenced without an ACR registry prefix.
#
# ── Two ways to run locally ───────────────────────────────────────────────────
#
#  Option A — Helm (recommended, more control):
#    See k8s/helm/django-react/values-local.yaml for the full guide.
#    helm upgrade --install django-react ./k8s/helm/django-react \
#      -f k8s/helm/django-react/values-local.yaml ...
#
#  Option B — Kustomize (this file):
#    kubectl apply -k k8s/overlays/local
#
# ── Kustomize quickstart ──────────────────────────────────────────────────────
#
# 1. Start your local cluster (Docker Desktop → Settings → Kubernetes → Enable,
#    or: kind create cluster --name local)
#
# 2. Build images:
#    docker build --target production -f backend/Dockerfile  -t backend:local .
#    docker build --target production -f frontend/Dockerfile \
#      --build-arg VITE_API_URL=http://localhost \
#      --build-arg VITE_ENV=development \
#      -t frontend:local .
#
#    For kind — load images into the cluster after building:
#    kind load docker-image backend:local frontend:local --name local
#
# 3. Deploy:
#    kubectl apply -k k8s/overlays/local
#
# 4. Access:
#    Option A (with nginx ingress controller installed):
#      kubectl get svc -n ingress-nginx   # get EXTERNAL-IP (127.0.0.1 on Docker Desktop)
#      curl http://localhost/api/health/
#
#    Option B (port-forward, no ingress needed):
#      kubectl port-forward svc/backend  8000:8000 -n local &
#      kubectl port-forward svc/frontend 8080:80   -n local &
#      curl http://localhost:8000/api/health/
#      open http://localhost:8080
#
# 5. Tear down:
#    kubectl delete -k k8s/overlays/local

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: local

resources:
  - ../../base

# ── Image overrides ────────────────────────────────────────────────────────────
# Replaces ACR image refs with local names. The base deployments reference
# <ACR_NAME>.azurecr.io/backend — replace both name and tag here.
images:
  - name: <ACR_NAME>.azurecr.io/backend
    newName: backend
    newTag: local
  - name: <ACR_NAME>.azurecr.io/frontend
    newName: frontend
    newTag: local

patches:

  # ── Namespace rename ────────────────────────────────────────────────────────
  - target:
      kind: Namespace
      name: production
    patch: |-
      - op: replace
        path: /metadata/name
        value: local

  # ── ConfigMap — local settings ──────────────────────────────────────────────
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
      data:
        DJANGO_SETTINGS_MODULE: "config.settings.dev"
        DEBUG: "True"
        ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
        CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://localhost"
        VITE_ENV: "development"
        VITE_API_URL: "http://localhost"

  # ── Secret — local dev values (safe to commit, not real secrets) ─────────────
  # Decoded:
  #   DJANGO_SECRET_KEY=local-dev-secret-key
  #   DATABASE_URL=postgres://postgres:postgres@db:5432/myapp_local
  #   REDIS_URL=redis://redis:6379/0
  #   POSTGRES_USER=postgres  POSTGRES_PASSWORD=postgres  POSTGRES_DB=myapp_local
  - target:
      kind: Secret
      name: app-secrets
    patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: app-secrets
      data:
        DJANGO_SECRET_KEY: bG9jYWwtZGV2LXNlY3JldC1rZXk=
        DATABASE_URL: cG9zdGdyZXM6Ly9wb3N0Z3Jlczpwb3N0Z3Jlc0BkYjo1NDMyL215YXBwX2xvY2Fs
        REDIS_URL: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=
        POSTGRES_USER: cG9zdGdyZXM=
        POSTGRES_PASSWORD: cG9zdGdyZXM=
        POSTGRES_DB: bXlhcHBfbG9jYWw=

  # ── Ingress — remove hostname + disable TLS ─────────────────────────────────
  # Without a host field, nginx-ingress accepts requests for any hostname (including
  # localhost). TLS is removed — no cert-manager or public DNS locally.
  - target:
      kind: Ingress
      name: app-ingress
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: app-ingress
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "false"
          nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
          nginx.ingress.kubernetes.io/rewrite-target: "/$2"
          nginx.ingress.kubernetes.io/proxy-body-size: "20m"
      spec:
        tls: null
        rules:
          - http:
              paths:
                - path: /api(/|$)(.*)
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: backend
                      port:
                        number: 8000
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: frontend
                      port:
                        number: 80

  # ── Backend — 1 replica, no imagePullSecrets, lower resources ────────────────
  - target:
      kind: Deployment
      name: backend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: backend
                imagePullPolicy: Never
                resources:
                  requests:
                    cpu: "100m"
                    memory: "128Mi"
                  limits:
                    cpu: "250m"
                    memory: "256Mi"
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: remove
        path: /spec/template/spec/imagePullSecrets
      - op: remove
        path: /spec/template/spec/topologySpreadConstraints

  # ── Frontend — same ─────────────────────────────────────────────────────────
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: frontend
                imagePullPolicy: Never
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "100m"
                    memory: "128Mi"
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: remove
        path: /spec/template/spec/imagePullSecrets
      - op: remove
        path: /spec/template/spec/topologySpreadConstraints

  # ── Postgres PVC — use built-in local storage class ──────────────────────────
  # Docker Desktop: hostpath  |  kind / minikube: standard
  - target:
      kind: PersistentVolumeClaim
      name: postgres-data
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: hostpath
      - op: replace
        path: /spec/resources/requests/storage
        value: 1Gi

  # ── Redis PVC — disable persistence locally (Redis is just a cache) ──────────
  # Replace the PVC's storage class with hostpath and a tiny size.
  # Alternatively, remove the volume entirely from the redis Deployment.
  - target:
      kind: PersistentVolumeClaim
      name: redis-data
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: hostpath
      - op: replace
        path: /spec/resources/requests/storage
        value: 256Mi

  # ── Redis Deployment — disable AOF persistence locally ──────────────────────
  - target:
      kind: Deployment
      name: redis
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redis
      spec:
        template:
          spec:
            containers:
              - name: redis
                command:
                  - redis-server
                  - --maxmemory
                  - 64mb
                  - --maxmemory-policy
                  - allkeys-lru
                  - --save
                  - ""
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "100m"
                    memory: "128Mi"

  # ── DB Deployment — lower resources ─────────────────────────────────────────
  - target:
      kind: Deployment
      name: db
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: db
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: "100m"
                    memory: "128Mi"
                  limits:
                    cpu: "250m"
                    memory: "256Mi"

  # ── HPAs — lock to 1 replica (no metrics-server by default locally) ──────────
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  # ── StorageClasses — replace AKS provisioner with local one ─────────────────
  # disk.csi.azure.com doesn't exist on local clusters. Replace with a valid
  # local provisioner so the resources apply cleanly.
  # The actual PVCs above are patched to use hostpath/standard directly,
  # so these StorageClasses are not used — but they must apply without error.
  - target:
      kind: StorageClass
      name: managed-premium
    patch: |-
      - op: replace
        path: /provisioner
        value: docker.io/hostpath
      - op: replace
        path: /volumeBindingMode
        value: Immediate
      - op: replace
        path: /parameters
        value: {}
  - target:
      kind: StorageClass
      name: managed-standard-ssd
    patch: |-
      - op: replace
        path: /provisioner
        value: docker.io/hostpath
      - op: replace
        path: /volumeBindingMode
        value: Immediate
      - op: replace
        path: /parameters
        value: {}

  # ── RBAC — replace CI SA reference with default ─────────────────────────────
  # github-actions-sa doesn't exist locally. Point the deployer binding at
  # the default SA so it applies without error (has no real effect locally).
  - target:
      kind: RoleBinding
      name: django-react-cicd-deployer
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: default
  - target:
      kind: ClusterRoleBinding
      name: django-react-cicd-pv-reader
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: default
